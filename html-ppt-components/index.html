<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="HTML PPT组件图册，按流程、关系、对比、内容和数据可视化分类浏览，支持预览并复制 HTML 片段。">
  <meta name="keywords" content="HTML PPT组件, PPT组件, 网页PPT, HTML幻灯片, AI生成PPT, Wise, 歪斯">
  <meta name="author" content="Wise">
  <title>HTML PPT组件</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./assets/fonts/source-han.css?v=1">
  <style>
    /* ===== Design System ===== */
    :root {
      --bg: #f4f3ee; --panel: #eeede6; --surface: #f4f3ee;
      --card-bg: #ffffff;
      --card-line: #e6e1d5;
      --text: #1d1d18; --muted: #7a7568; --line: #d9d6cc;
      --color-text-muted: var(--muted);
      --accent: #002FA7; --accent-dim: rgba(0,47,167,0.08);
      --thumb-w: 240px;
      --radius: 12px;
      --detail-panel-body-h: min(58vh, 520px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: "Wise Han Sans SC";
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ===== Shell ===== */
    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ===== Page Header ===== */
    .page-header {
      margin-top: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .page-title {
      font-family: "Wise Han Serif SC";
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }
    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.75rem 0 1.5rem;
      align-items: center;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 0.25px solid var(--line);
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: border-color .15s, color .15s, background .15s;
    }
    .meta-pill:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    /* ===== Filter Bar (tabs) ===== */
    .filter-controls {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      width: fit-content;
      max-width: 100%;
      gap: 0.75rem;
      margin: 1rem 0 1.5rem;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0;
      width: 100%;
    }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.9rem;
      border-radius: 12px;
      border: 0.25px solid var(--line);
      background: var(--card-bg);
      font-family: "Wise Han Sans SC";
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .filter-btn.active {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
    }
    .filter-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .filter-btn .filter-count {
      font-size: 0.75rem;
      opacity: 0.6;
    }
    .search-bar {
      width: 100%;
      margin: 0;
    }
    .search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-input-wrap svg {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: rgba(29,29,24,0.48);
      pointer-events: none;
    }
    .component-search {
      width: 100%;
      height: 36px;
      min-height: 36px;
      padding: 0 0.9rem 0 2.5rem;
      border: 0.25px solid rgba(29,29,24,0.16);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font-family: "Wise Han Sans SC";
      font-weight: 400;
      font-size: 0.9rem;
      outline: none;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .component-search::placeholder { color: rgba(29,29,24,0.44); }
    .component-search:hover {
      background: #eceae2;
      border-color: rgba(29,29,24,0.24);
    }
    .component-search:focus {
      background: var(--surface);
      border-color: rgba(0,47,167,0.45);
      box-shadow: 0 0 0 3px rgba(0,47,167,0.06);
    }

    /* ===== Grid View ===== */
    .grid-view { padding: 0; }
    .pagination {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
    }
    .thumb-card {
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(46, 44, 37, 0.06);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      overflow: hidden;
      padding: 1.25rem;
    }
    .thumb-card:hover {
      border-color: #cfc6b8;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(46, 44, 37, 0.12);
    }
    .thumb-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .thumb-preview iframe {
      width: 600px;
      height: 600px;
      border: none;
      pointer-events: none;
      transform-origin: center center;
      flex-shrink: 0;
    }
    .thumb-label {
      padding: 12px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-top: 0.25px solid var(--line);
    }
    .thumb-name {
      font-family: "Wise Han Serif SC";
      font-size: 15px;
      font-weight: 700;
      color: #000;
    }
    /* ===== Detail View ===== */
    .detail-view {
      display: none;
      padding: 2.5rem 0 28px;
      max-width: 960px;
    }
    .detail-view.active { display: block; }
    .grid-view.hidden { display: none; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      border: none;
      background: none;
      flex-shrink: 0;
      text-decoration: none;
      transition: color 0.15s;
    }
    .detail-back:hover { color: var(--text); }
    .detail-back svg { display: block; }

    /* Back to Top */
    #back-to-top {
      position: fixed;
      right: 1.5rem;
      bottom: 1.5rem;
      z-index: 100;
      cursor: pointer;
      background: var(--card-bg);
      color: var(--text);
      border: 0.25px solid var(--line);
      border-radius: 12px;
      width: 44px;
      height: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    #back-to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #back-to-top:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    #back-to-top svg {
      display: block;
      width: 20px;
      height: 20px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .detail-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: "Wise Han Serif SC";
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }
    .detail-group-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .detail-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .detail-source {
      max-width: 700px;
      margin: -8px 0 20px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .detail-source a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(0,47,167,0.28);
    }
    .detail-source a:hover {
      border-bottom-color: var(--accent);
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .tag {
      padding: 5px 10px;
      border: 1px solid var(--line);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .tag.accent {
      border-color: rgba(217,94,0,0.4);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Detail Panel */
    .detail-panel {
      max-width: 700px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .detail-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .view-tabs {
      display: flex;
      align-items: center;
    }
    .view-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 44px;
      padding: 0 18px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
    }
    .view-tab svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .detail-panel-body {
      display: none;
      position: relative;
      background: #fff;
      overflow: hidden;
      height: var(--detail-panel-body-h);
    }
    .detail-panel-body.active { display: block; }
    .detail-preview {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .detail-preview.detail-preview--scrollable {
      overflow: auto;
      align-items: flex-start;
      padding: 28px 0;
    }
    .detail-preview iframe {
      width: 700px;
      height: 700px;
      border: none;
      pointer-events: none;
      transform-origin: center center;
      flex-shrink: 0;
    }
    .source-panel pre {
      margin: 0;
      padding: 16px 18px;
      height: 100%;
      overflow: auto;
      overflow-x: auto;
      color: var(--text);
      font-size: 12px;
      line-height: 1.65;
      font-family: "Wise Han Sans SC";
      font-weight: 400;
      white-space: pre-wrap;
      word-break: break-word;
      outline: none;
    }
    .source-panel pre:focus-visible {
      box-shadow: inset 0 0 0 2px var(--accent, #6366f1);
    }
    .code-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding-right: 10px;
    }
    .copy-btn,
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 34px;
      padding: 0 8px;
      background: transparent;
      border: 0;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.05em;
      outline: none;
      transition: color .15s;
    }
    .copy-btn svg,
    .download-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .copy-btn:hover,
    .copy-btn:focus-visible,
    .copy-btn:active,
    .copy-btn.copied,
    .download-btn:hover,
    .download-btn:focus-visible,
    .download-btn:active,
    .download-btn.downloaded {
      color: var(--accent);
      font-weight: 700;
      background: transparent;
      box-shadow: none;
    }

    /* Detail Navigation (prev/next) */
    .detail-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 700px;
      gap: 1rem;
      margin: 2rem 0 1rem;
    }
    .detail-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.15rem;
      border: 0;
      background: transparent;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .detail-nav-btn:hover {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }
    .detail-nav-spacer { width: 0; }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 1120px) {
      .thumb-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .thumb-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .shell { padding: 0 1rem; }
      .thumb-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="page-header">
      <h1 class="page-title" style="display:flex;align-items:center;gap:0.5rem;"><a id="back-link" href="../" title="返回" style="display:inline-flex;color:var(--color-text-muted);text-decoration:none;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>HTML PPT组件</h1>
      <p class="page-subtitle">面向 AI 生成网页 PPT 的组件图册，按场景分类浏览并复制 HTML 片段。</p>
      <div class="project-meta">
        <a class="meta-pill" href="https://github.com/WiseWong6/wise-labs" target="_blank" rel="noopener noreferrer">

          源代码
        </a>
      </div>
    </div>
    <div class="filter-controls" id="filterControls">
      <nav class="filter-bar" id="filterBar"></nav>
      <div class="search-bar" id="searchBar">
        <label class="search-input-wrap" for="componentSearch">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="component-search" id="componentSearch" type="search" placeholder="搜索组件名称、英文名或分类" autocomplete="off" spellcheck="false">
        </label>
      </div>
    </div>
    <div id="gridView" class="grid-view"></div>
    <nav class="pagination" id="pagination"></nav>
    <div id="detailView" class="detail-view"></div>

    <button id="back-to-top" type="button" aria-label="回到顶部">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
    </button>
  </div>

  <script src="./catalog-data.js"></script>
  <script>
    // ===== Data =====
    const DATA = window.SWISS_CATALOG_DATA;
    const SOURCE_HAN_SANS = '"Wise Han Sans SC"';
    const SOURCE_HAN_SERIF = '"Wise Han Serif SC"';
    function isSerifFontDeclaration(declaration) {
      const primaryFamily = (declaration.match(/font-family\s*:\s*([^,;]+)/i)?.[1] || '')
        .replace(/["']/g, '')
        .trim();
      return /^(?:Noto Serif SC|Wise Han Serif SC|Songti SC|SimSun|serif)$/i.test(primaryFamily);
    }
    function normalizeComponentFonts(css) {
      return String(css || '')
        .replace(/font-family\s*:\s*[^;]+;/gi, declaration => (
          isSerifFontDeclaration(declaration)
            ? `font-family: ${SOURCE_HAN_SERIF} !important;`
            : `font-family: ${SOURCE_HAN_SANS} !important;`
        ));
    }
    const COMPONENT_CSS = normalizeComponentFonts(DATA.componentCss);
    const entries = DATA.entries;

    function slugComponentPart(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function buildComponentId(entry) {
      const parts = [
        entry.group,
        entry.name,
        entry.variant || 'default'
      ].map(slugComponentPart).filter(Boolean);
      return parts.join('-') || `component-${entry.num}`;
    }

    const componentIdCounts = new Map();
    entries.forEach(entry => {
      const baseId = buildComponentId(entry);
      const count = componentIdCounts.get(baseId) || 0;
      componentIdCounts.set(baseId, count + 1);
      entry.componentId = count > 0 ? `${baseId}-${entry.num}` : baseId;
    });
    const entriesByComponentId = new Map(entries.map(entry => [entry.componentId, entry]));

    // Category order — derived from groupLabel of first occurrence
    const GROUP_ORDER = ['内容/排版', '对比/评估', '流程/时序', '结构/关系', '数据/图表'];
    const CAT_ORDER = GROUP_ORDER.filter(g => entries.some(e => e.groupLabel === g));


    // ===== State =====
    const state = {
      activeGroup: null,
      search: '',
      layout: null,    // entry num for detail view
      lastGridScrollTop: 0,
      lastGridCardKey: null,
      detailOpenedFromGrid: false,
      restoreGridScrollTop: 0,
      restoreGridCardKey: null,
      pendingGridRestore: false,
      page: 1
    };

    // ===== DOM refs =====
    const filterControlsEl = document.getElementById('filterControls');
    const filterBarEl = document.getElementById('filterBar');
    const searchBarEl = document.getElementById('searchBar');
    const componentSearchEl = document.getElementById('componentSearch');
    const gridViewEl = document.getElementById('gridView');
    const detailViewEl = document.getElementById('detailView');
    const paginationEl = document.getElementById('pagination');
    const PAGE_SIZE = 12;

    function requestParentClose() {
      if (window.parent === window) return false;
      try {
        if (typeof window.parent.closeTab === 'function') {
          window.parent.closeTab();
          return true;
        }
      } catch (err) {}
      try {
        window.parent.postMessage({ type: 'close-tab' }, '*');
        return true;
      } catch (err) {}
      return false;
    }

    const backLink = document.getElementById('back-link');
    if (backLink) {
      backLink.addEventListener('click', (event) => {
        if (!requestParentClose()) return;
        event.preventDefault();
      });
    }

    // ===== Helpers =====
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getCardKey(entry) {
      return `${entry.name}::${entry.variant || 'default'}`;
    }

    function getCurrentCardKey() {
      if (!state.layout) return null;
      const entry = entries.find(e => e.num === state.layout);
      return entry ? getCardKey(entry) : null;
    }

    function getComponentIdByLayout(layout) {
      const entry = entries.find(e => e.num === layout);
      return entry ? entry.componentId : null;
    }

    function getCurrentComponentId() {
      return getComponentIdByLayout(state.layout);
    }

    function getSourceLabel(source) {
      if (!source) return '';
      return [source.name, source.label].filter(Boolean).join(' ');
    }

    function normalizeSearchText(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[\s_-]+/g, '')
        .trim();
    }

    function getSearchCorpus(entry) {
      return [
        entry.label,
        entry.name,
        entry.variant,
        entry.group,
        entry.groupLabel,
        entry.description,
        getSourceLabel(entry.source)
      ].filter(Boolean).join(' ');
    }

    function getPageScrollTop() {
      return window.scrollY || document.documentElement.scrollTop || 0;
    }

    function setPageScrollTop(top) {
      window.scrollTo({ top: Math.max(0, top), behavior: 'auto' });
    }

    const WRAPPED_FLOW_CSS = normalizeComponentFonts(`
    .swiss-card .process-chain[data-type="wrap"] {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);

    // ===== Preview Doc Builder =====

    function getSourceStyleOverrides(entry) {
      return [
        entry.variant === 'wrapped' ? WRAPPED_FLOW_CSS : '',
        COMPONENT_FONT_OVERRIDES
      ].filter(Boolean).join('\n');
    }

    function injectStyleOverrides(html, overrides) {
      if (!overrides || !html.includes('</style>')) return html;
      return html.replace('</style>', `${overrides}\n</style>`);
    }

    function buildSourceDoc(entry, previewDoc) {
      if (!entry.copyHtml) return normalizeComponentFonts(previewDoc);
      return normalizeComponentFonts(injectStyleOverrides(entry.copyHtml, getSourceStyleOverrides(entry)));
    }

    function sanitizeFilenamePart(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5-]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function getDownloadFilename(entry) {
      const name = sanitizeFilenamePart(entry.name) || 'component';
      const suffix = sanitizeFilenamePart(entry.variant || entry.num) || String(entry.num);
      return `html-ppt-${name}-${suffix}.html`;
    }

    function getDetailPreviewFrame(entry) {
      if (entry && entry.name === 'arch-platform-complex-v') {
        return { width: 700, height: 700, scrollable: true };
      }
      return { width: 700, height: 700, scrollable: false };
    }

    function downloadSourceDoc(sourceDoc, filename) {
      const blob = new Blob([sourceDoc], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => { URL.revokeObjectURL(url); }, 1000);
    }

    // ===== Mind Map Connector Sync =====
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function getElementScale(el) {
      const transform = getComputedStyle(el).transform;
      if (!transform || transform === 'none') return 1;
      const matrixMatch = transform.match(/matrix\(([^)]+)\)/);
      if (matrixMatch) {
        const values = matrixMatch[1].split(',').map(v => Number.parseFloat(v.trim()));
        if (values.length >= 2) return Math.hypot(values[0], values[1]) || 1;
      }
      return 1;
    }

    function toLocalRect(el, containerRect, scale) {
      const rect = el.getBoundingClientRect();
      const left = (rect.left - containerRect.left) / scale;
      const top = (rect.top - containerRect.top) / scale;
      const width = rect.width / scale;
      const height = rect.height / scale;
      return { left, top, width, height, right: left + width, bottom: top + height, centerX: left + width / 2, centerY: top + height / 2 };
    }

    function createSvgOverlay(doc, mm, width, height) {
      let overlay = mm.querySelector(':scope > .mind-map-overlay');
      if (!overlay) {
        overlay = doc.createElementNS(SVG_NS, 'svg');
        overlay.setAttribute('class', 'mind-map-overlay');
        overlay.setAttribute('aria-hidden', 'true');
        mm.appendChild(overlay);
      }
      overlay.replaceChildren();
      overlay.setAttribute('viewBox', `0 0 ${width} ${height}`);
      return overlay;
    }

    function syncIframeMindMap(iframe) {
      const run = () => {
        if (!iframe.isConnected) return;
        const doc = iframe.contentDocument;
        if (!doc || doc.readyState !== 'complete') { requestAnimationFrame(run); return; }
        syncMindMapConnectors(doc);
      };
      requestAnimationFrame(run);
    }

    function appendLine(svg, x1, y1, x2, y2) {
      if (![x1, y1, x2, y2].every(Number.isFinite)) return;
      const line = svg.ownerDocument.createElementNS(SVG_NS, 'line');
      line.setAttribute('class', 'mind-map-line');
      line.setAttribute('x1', String(x1));
      line.setAttribute('y1', String(y1));
      line.setAttribute('x2', String(x2));
      line.setAttribute('y2', String(y2));
      svg.appendChild(line);
    }

    function syncMindMapConnectors(doc) {
      if (!doc) return;
      doc.querySelectorAll('.mind-map').forEach(mm => {
        const mmRect = mm.getBoundingClientRect();
        if (!mmRect.width || !mmRect.height) return;
        const scale = getElementScale(mm);
        const width = mmRect.width / scale;
        const height = mmRect.height / scale;
        const svg = createSvgOverlay(doc, mm, width, height);
        const rootNode = mm.querySelector(':scope > .root-node');
        const branches = mm.querySelector('.branches');
        if (!rootNode || !branches) return;

        const branchNodes = Array.from(branches.querySelectorAll(':scope > .branch'))
          .map(branch => {
            const node = branch.querySelector(':scope > .node');
            return node ? { branch, node, nodeRect: toLocalRect(node, mmRect, scale) } : null;
          })
          .filter(Boolean);
        if (!branchNodes.length) return;

        const rootRect = toLocalRect(rootNode, mmRect, scale);
        const branchesRect = toLocalRect(branches, mmRect, scale);

        if (mm.dataset.type === 'vertical') {
          const branchGap = 24;
          const branchLeft = Math.min(...branchNodes.map(item => item.nodeRect.left));
          const spineX = Math.max(rootRect.right + 20, branchLeft - branchGap);
          const spineTop = Math.min(...branchNodes.map(item => item.nodeRect.centerY));
          const spineBottom = Math.max(...branchNodes.map(item => item.nodeRect.centerY));
          appendLine(svg, rootRect.right, rootRect.centerY, spineX, rootRect.centerY);
          appendLine(svg, spineX, spineTop, spineX, spineBottom);
          branchNodes.forEach(({ branch, nodeRect }) => {
            appendLine(svg, spineX, nodeRect.centerY, nodeRect.left, nodeRect.centerY);
            const subBranches = branch.querySelector(':scope > .sub-branches');
            if (!subBranches) return;
            const subNodes = Array.from(subBranches.querySelectorAll(':scope > .sub-node'))
              .map(subNode => toLocalRect(subNode, mmRect, scale));
            if (!subNodes.length) return;
            const subGap = 24;
            const subLeft = Math.min(...subNodes.map(sub => sub.left));
            const subSpineX = Math.max(nodeRect.right + 18, subLeft - subGap);
            const subSpineTop = Math.min(nodeRect.centerY, ...subNodes.map(sub => sub.centerY));
            const subSpineBottom = Math.max(nodeRect.centerY, ...subNodes.map(sub => sub.centerY));
            appendLine(svg, nodeRect.right, nodeRect.centerY, subSpineX, nodeRect.centerY);
            appendLine(svg, subSpineX, subSpineTop, subSpineX, subSpineBottom);
            subNodes.forEach(subNodeRect => {
              appendLine(svg, subSpineX, subNodeRect.centerY, subNodeRect.left, subNodeRect.centerY);
            });
          });
          return;
        }

        const firstNodeRect = branchNodes[0].nodeRect;
        const lastNodeRect = branchNodes[branchNodes.length - 1].nodeRect;
        const spineY = branchesRect.top;
        appendLine(svg, rootRect.centerX, rootRect.bottom, rootRect.centerX, spineY);
        appendLine(svg, firstNodeRect.centerX, spineY, lastNodeRect.centerX, spineY);
        branchNodes.forEach(({ nodeRect }) => {
          appendLine(svg, nodeRect.centerX, spineY, nodeRect.centerX, nodeRect.top);
        });
      });
    }

    // ===== Filtering =====
    // Unique entries — one card per entry (entry = layout + variant combo)
    function getUniqueEntries() {

    function matchesFilter(entry) {
      if (state.activeGroup && entry.groupLabel !== state.activeGroup) return false;
      const query = normalizeSearchText(state.search);
      if (!query) return true;
      return normalizeSearchText(getSearchCorpus(entry)).includes(query);
    }

    function getFilteredEntries() {
      return getUniqueEntries().filter(matchesFilter);

    // ===== Grid View =====
    function renderGrid() {
      const filtered = getFilteredEntries();
      if (filtered.length === 0) {
        gridViewEl.innerHTML = '<div class="empty-state">没有匹配的组件。</div>';
        paginationEl.style.display = 'none';
        return;
      }

      // Pagination
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      let html = '<div class="thumb-grid">';
      pageItems.forEach(entry => {
        const cardKey = getCardKey(entry);

        html += `<div class="thumb-card" data-num="${entry.num}" data-card-key="${esc(cardKey)}">

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        paginationEl.style.display = 'none';
        return;
      }
      paginationEl.style.display = 'flex';
      let html = `<button class="filter-btn" data-page="prev" ${state.page <= 1 ? 'disabled' : ''}>上一页</button>`;
      for (let p = 1; p <= totalPages; p++) {
        html += `<button class="filter-btn${p === state.page ? ' active' : ''}" data-page="${p}">${p}</button>`;
      }

      paginationEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = btn.dataset.page;
          if (p === 'prev' && state.page > 1) state.page--;
          else if (p === 'next' && state.page < totalPages) state.page++;

      // Insert detail iframe
      const previewBox = document.getElementById('detailPreviewBox');
      const iframe = document.createElement('iframe');
      iframe.addEventListener('load', () => { syncMindMapConnectors(iframe.contentDocument); });
      iframe.srcdoc = previewDoc;
      const previewFrame = getDetailPreviewFrame(entry);
      previewBox.classList.toggle('detail-preview--scrollable', previewFrame.scrollable);
      iframe.style.width = `${previewFrame.width}px`;
      iframe.style.height = `${previewFrame.height}px`;
      const containerW = previewBox.offsetWidth || previewFrame.width;
      const scale = Math.min(containerW / previewFrame.width, 1);
      iframe.style.transform = `scale(${scale})`;
      previewBox.appendChild(iframe);
      previewBox.scrollTop = 0;
      syncIframeMindMap(iframe);

      // Back button
      document.getElementById('backBtn').addEventListener('click', () => {
        if (state.detailOpenedFromGrid) {
          const fallback = createSnapshot('grid', {
            cardKey: state.lastGridCardKey || getCurrentCardKey(),
            scrollTop: state.lastGridScrollTop
          });
          applySnapshot(fallback);
          state.detailOpenedFromGrid = false;
          commitHistory('replace', fallback);
          render();
          return;
        }
        const fallback = { view: 'grid', search: state.search, layout: null, cardKey: getCurrentCardKey(), scrollTop: 0, fromGrid: false };
        applySnapshot(fallback);
        state.detailOpenedFromGrid = false;
        commitHistory('replace', fallback);
        render();
      });

      detailViewEl.querySelectorAll('.view-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          const nextView = btn.dataset.viewTab;
          detailViewEl.querySelectorAll('.view-tab').forEach(tab => {
            const isActive = tab.dataset.viewTab === nextView;
            tab.classList.toggle('active', isActive);
            tab.setAttribute('aria-selected', String(isActive));
          });
          detailViewEl.querySelectorAll('.detail-panel-body').forEach(panel => {
            const isActive = panel.dataset.viewPanel === nextView;
            panel.classList.toggle('active', isActive);
            panel.hidden = !isActive;
          });
        });
      });

      // Copy buttons
      detailViewEl.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(sourceDoc).then(() => {
            btn.querySelector('span').textContent = '已复制';
            btn.classList.add('copied');
            setTimeout(() => { btn.querySelector('span').textContent = '复制代码'; btn.classList.remove('copied'); }, 1500);
          });
        });
      });

      detailViewEl.querySelectorAll('.download-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          downloadSourceDoc(sourceDoc, getDownloadFilename(entry));
          btn.querySelector('span').textContent = '已下载';
          btn.classList.add('downloaded');
          setTimeout(() => { btn.querySelector('span').textContent = '下载文件'; btn.classList.remove('downloaded'); }, 1500);
        });
      });

      // Detail navigation (prev/next)
      detailViewEl.querySelectorAll('.detail-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const num = parseInt(btn.dataset.num);
          state.lastGridScrollTop = getPageScrollTop();
          state.lastGridCardKey = getCurrentCardKey();
          state.detailOpenedFromGrid = true;
          commitHistory('replace', createSnapshot('detail', { cardKey: getCurrentCardKey(), fromGrid: true }));
          state.layout = num;
          state.pendingGridRestore = false;
          commitHistory('push', createSnapshot('detail', { cardKey: getCardKey(entries.find(e => e.num === num)), componentId: getComponentIdByLayout(num), fromGrid: true }));
          render();
        });
      });

      renderFilterBar();
    }

    // ===== History Router =====
    function buildHash(snapshot) {
      if (snapshot.view === 'detail' && snapshot.layout) {
        const componentId = snapshot.componentId || getComponentIdByLayout(snapshot.layout);
        if (componentId) return '#/component/' + encodeURIComponent(componentId);
        return '#/layout/' + encodeURIComponent(snapshot.layout);
      }
      return '#/';
    }

    function createSnapshot(view, overrides = {}) {
      return Object.assign({
        view,
        search: state.search,
        layout: view === 'detail' ? state.layout : null,
        componentId: view === 'detail' ? getCurrentComponentId() : null,
        cardKey: view === 'detail' ? getCurrentCardKey() : null,
        scrollTop: 0,
        fromGrid: false
      }, overrides);
    }

    function commitHistory(mode, snapshot) {
      history[mode + 'State'](snapshot, '', buildHash(snapshot));
      notifyParentRoute(snapshot);
    }

    function notifyParentRoute(snapshot) {
      if (window.parent === window) return;
      const component = snapshot.view === 'detail'
        ? (snapshot.componentId || getComponentIdByLayout(snapshot.layout))
        : null;
      try {
        window.parent.postMessage({
          type: 'html-ppt-components-route',
          component: component || ''
        }, '*');
      } catch (err) {}
    }

    function applySnapshot(snapshot) {
      state.search = snapshot.search || '';
      state.layout = snapshot.view === 'detail' ? (snapshot.layout || null) : null;
      state.restoreGridCardKey = snapshot.view === 'grid' ? (snapshot.cardKey || null) : null;
      state.restoreGridScrollTop = snapshot.view === 'grid' && Number.isFinite(snapshot.scrollTop) ? snapshot.scrollTop : 0;
      state.pendingGridRestore = snapshot.view === 'grid' && !!(snapshot.cardKey || snapshot.scrollTop > 0);
    }

    function findGridCardByKey(cardKey) {
      if (!cardKey) return null;
      return Array.from(gridViewEl.querySelectorAll('.thumb-card')).find(card => card.dataset.cardKey === cardKey) || null;
    }

    function snapshotFromHash() {
      const h = location.hash || '#/';
      const hashBody = h.replace('#/', '');
      if (!hashBody) return { view: 'grid', search: '', layout: null, cardKey: null, scrollTop: 0, fromGrid: false };
      const parts = hashBody.split('/');
      if (parts[0] === 'component' && parts[1]) {
        const componentId = decodeURIComponent(parts[1]);
        const entry = entriesByComponentId.get(componentId);
        if (entry) {
          return { view: 'detail', search: '', layout: entry.num, componentId: entry.componentId, cardKey: getCardKey(entry), scrollTop: 0, fromGrid: false };
        }
      }
      if (parts[0] === 'layout' && parts[1]) {
        const num = parseInt(decodeURIComponent(parts[1]));
        const entry = entries.find(e => e.num === num);
        if (entry) {
          return { view: 'detail', search: '', layout: num, componentId: entry.componentId, cardKey: getCardKey(entry), scrollTop: 0, fromGrid: false };
        }
      }
      return { view: 'grid', search: '', layout: null, cardKey: null, scrollTop: 0, fromGrid: false };
    }

    function getActiveSnapshot(fallbackState) {
      if (fallbackState && (fallbackState.view === 'grid' || fallbackState.view === 'detail')) return fallbackState;
      return snapshotFromHash();
    }

    // ===== Main Render =====
    function render() {
      if (state.layout) {
        // Detail view: hide grid, filter bar, header
        gridViewEl.classList.add('hidden');
        detailViewEl.classList.add('active');
        filterControlsEl.style.display = 'none';
        filterBarEl.style.display = 'none';
        searchBarEl.style.display = 'none';
        document.querySelector('.page-header').style.display = 'none';
        paginationEl.style.display = 'none';
        renderDetail();
        setPageScrollTop(0);
      } else {
        gridViewEl.classList.remove('hidden');
        detailViewEl.classList.remove('active');
        detailViewEl.innerHTML = '';
        filterControlsEl.style.display = '';
        filterBarEl.style.display = '';
        searchBarEl.style.display = '';
        componentSearchEl.value = state.search;
        document.querySelector('.page-header').style.display = '';
        paginationEl.style.display = '';
        renderFilterBar();
        renderGrid();
        if (state.pendingGridRestore) {
          requestAnimationFrame(() => {
            const targetCard = findGridCardByKey(state.restoreGridCardKey);
            if (targetCard) {
              targetCard.scrollIntoView({ block: 'center' });
            } else if (state.restoreGridScrollTop > 0) {
              setPageScrollTop(state.restoreGridScrollTop);
            } else {
              setPageScrollTop(0);
            }
            state.pendingGridRestore = false;
            state.restoreGridCardKey = null;
            state.restoreGridScrollTop = 0;
          });
        }
      }
    }

    window.addEventListener('popstate', event => {
      const snapshot = getActiveSnapshot(event.state);
      applySnapshot(snapshot);
      state.detailOpenedFromGrid = false;
      render();
      notifyParentRoute(snapshot);
    });

    componentSearchEl.addEventListener('input', () => {
      state.search = componentSearchEl.value;
      state.page = 1;
      renderGrid();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && state.layout) {
        const backBtn = document.getElementById('backBtn');
        if (backBtn) backBtn.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'a') {
        const pre = e.target.closest('.source-panel pre');
        if (pre) {
          e.preventDefault();
          const range = document.createRange();
          range.selectNodeContents(pre);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }
    });

    // Back to top button
    const backToTopBtn = document.getElementById('back-to-top');
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    window.addEventListener('scroll', () => {
      backToTopBtn.classList.toggle('visible', window.scrollY > 300);
    }, { passive: true });

    // ===== Init =====
    const initialSnapshot = snapshotFromHash();
    applySnapshot(initialSnapshot);
    state.detailOpenedFromGrid = false;
    commitHistory('replace', initialSnapshot);
    render();
  </script>
</body>
</html>
