name: Update Star History

on:
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/scripts/generate-star-history.mjs'
      - '.github/workflows/update-star-history.yml'

permissions:
  contents: write

concurrency:
  group: update-star-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate star history image
        run: node .github/scripts/generate-star-history.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit updated image
        run: |
          if git diff --quiet -- assets/star-history.svg assets/star-history.json; then
            echo "No star history changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg assets/star-history.json
          git commit -m "Update Star History image"
          git push
